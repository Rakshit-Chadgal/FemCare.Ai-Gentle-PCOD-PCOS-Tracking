<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://media.base44.com/images/public/6a547584a0e6c746a78f8067/ea2a99f0c_generated_image.png" />
    <link rel="apple-touch-icon" href="https://media.base44.com/images/public/6a547584a0e6c746a78f8067/ea2a99f0c_generated_image.png" />
    <meta name="theme-color" content="#E0859F" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>FemCare — Gentle PCOD/PCOS Tracking</title>
    <script>
      (function() {
        var theme = localStorage.getItem('femcare-theme');
        if (theme === 'dark') document.documentElement.classList.add('dark');
        window.addEventListener('load', function() {
          requestAnimationFrame(function() {
            requestAnimationFrame(function() {
              document.documentElement.classList.add('theme-ready');
            });
          });
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
